services:
  backend:
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./storage:/app/storage
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
      ]

  worker:
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./storage:/app/storage
    command:
      [
        "watchfiles",
        "--filter",
        "python",
        "python -m celery -A app.celery_app.celery_app worker --loglevel=INFO --concurrency=1",
        "app",
      ]
