services:
  backend:
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./storage:/app/storage
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
      ]

  worker:
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./storage:/app/storage
    command:
      [
        "watchfiles",
        "--filter",
        "python",
        "python -m celery -A app.celery_app.celery_app worker --loglevel=INFO --concurrency=1",
        "app",
      ]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: deps
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_UPLOAD_API_BASE_URL: ""
      NEXT_PUBLIC_BACKEND_PORT: "8001"
      INTERNAL_API_BASE_URL: http://backend:8001
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./next.config.mjs:/app/next.config.mjs
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./next-env.d.ts:/app/next-env.d.ts
      - next_dev_cache:/app/.next
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0", "-p", "3000"]

volumes:
  next_dev_cache:
